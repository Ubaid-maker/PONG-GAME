<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
</head>
<body>
    <h1>Pong Game</h1>
    <div id="scoreboard">
        <span id="player1-score">0</span> - <span id="player2-score">0</span>
    </div>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <div id="controls">
        <button id="player1-up">Player 1 Up</button>
        <button id="player1-down">Player 1 Down</button>
        <button id="player2-up">Player 2 Up</button>
        <button id="player2-down">Player 2 Down</button>
    </div>
    <script src="pong.js"></script>
</body>
</html>
