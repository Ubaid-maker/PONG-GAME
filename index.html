<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <title>PONG - A Modern Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">PONG</h1>
            <p class="subtitle">Classic Game Reimagined</p>
        </header>

        <div class="game-wrapper">
            <div class="score-section">
                <div class="player-info player-1">
                    <span class="player-label">Player 1</span>
                    <span class="score" id="player1-score">0</span>
                </div>
                <canvas id="pongCanvas" width="1000" height="500"></canvas>
                <div class="player-info player-2">
                    <span class="player-label">Player 2 (AI)</span>
                    <span class="score" id="player2-score">0</span>
                </div>
            </div>

            <div class="game-status">
                <div id="status-message" class="status-message">Press <span class="key">SPACE</span> to Start</div>
            </div>

            <div class="controls-info">
                <div class="control-group">
                    <span class="control-icon">⬆️</span>
                    <span class="control-text">Move Up</span>
                </div>
                <div class="control-group">
                    <span class="control-icon">⬇️</span>
                    <span class="control-text">Move Down</span>
                </div>
                <div class="control-group">
                    <span class="control-icon">SPACE</span>
                    <span class="control-text">Start/Pause</span>
                </div>
            </div>

            <button class="reset-btn" id="reset-btn">New Game</button>
        </div>

        <footer class="footer">
            <p>First to 5 points wins!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
